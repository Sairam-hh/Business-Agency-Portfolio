<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Stackly Agency. The page you're looking for doesn't exist." />
  <title>404 — Stackly Agency</title>
  <style>
    :root{
      --primary:#111827;--secondary:#7C3AED;--accent:#06B6D4;--highlight:#F43F5E;
      --grad:linear-gradient(135deg,#7C3AED,#06B6D4);
      --ease:cubic-bezier(.22,1,.36,1);
      --font:'Segoe UI',system-ui,-apple-system,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--primary);color:#fff;min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;text-align:center;position:relative}
    a{text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none}

    .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:float 10s ease-in-out infinite}
    .orb-1{width:500px;height:500px;background:var(--secondary);top:-150px;left:-100px}
    .orb-2{width:400px;height:400px;background:var(--accent);bottom:-100px;right:-100px;animation-delay:2s}
    .orb-3{width:300px;height:300px;background:var(--highlight);top:50%;left:50%;animation-delay:4s;opacity:.15}
    @keyframes float{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-40px) translateX(30px)}}
    .grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse at center,#000 20%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse at center,#000 20%,transparent 70%)}

    .content{position:relative;z-index:5;padding:24px;max-width:600px}
    .logo{display:inline-flex;align-items:center;gap:10px;font-size:22px;font-weight:800;margin-bottom:40px}
    .logo .logo-mark{width:38px;height:38px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;box-shadow:0 6px 20px rgba(124,58,237,.35)}
    .logo span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

    .error-code{font-size:clamp(100px,22vw,180px);font-weight:900;line-height:1;letter-spacing:-8px;margin-bottom:20px;animation:pulse 3s ease-in-out infinite}
    .error-code .digit{display:inline-block;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:bounce 2s ease-in-out infinite}
    .error-code .digit:nth-child(1){animation-delay:0s}
    .error-code .digit:nth-child(2){animation-delay:.2s}
    .error-code .digit:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

    .glitch{position:relative;display:inline-block}
    .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .glitch::before{animation:glitch1 2.5s infinite;clip-path:polygon(0 0,100% 0,100% 45%,0 45%)}
    .glitch::after{animation:glitch2 2.5s infinite;clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%)}
    @keyframes glitch1{0%,90%,100%{transform:translate(0)}92%{transform:translate(-3px,2px)}94%{transform:translate(3px,-2px)}96%{transform:translate(-2px,1px)}}
    @keyframes glitch2{0%,90%,100%{transform:translate(0)}92%{transform:translate(3px,-2px)}94%{transform:translate(-3px,2px)}96%{transform:translate(2px,-1px)}}

    h1{font-size:clamp(24px,4vw,32px);font-weight:700;margin-bottom:16px;color:#fff}
    p{font-size:17px;color:rgba(255,255,255,.6);max-width:440px;margin:0 auto 36px;line-height:1.6}

    .actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 30px;border-radius:30px;font-size:15px;font-weight:600;transition:all .35s var(--ease);position:relative;overflow:hidden;white-space:nowrap}
    .btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(124,58,237,.3)}
    .btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);transition:left .6s var(--ease)}
    .btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(124,58,237,.42)}
    .btn-primary:hover::after{left:100%}
    .btn-outline{background:transparent;border:2px solid rgba(255,255,255,.25);color:#fff}
    .btn-outline:hover{border-color:#fff;transform:translateY(-3px);background:rgba(255,255,255,.05)}

    .float-emoji{position:absolute;font-size:32px;opacity:.3;animation:floatEmoji 6s ease-in-out infinite;pointer-events:none}
    .fe-1{top:15%;left:10%;animation-delay:0s}
    .fe-2{top:20%;right:12%;animation-delay:1s}
    .fe-3{bottom:18%;left:15%;animation-delay:2s}
    .fe-4{bottom:22%;right:10%;animation-delay:3s}
    @keyframes floatEmoji{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(10deg)}}

    .cursor-dot,.cursor-ring{position:fixed;top:0;left:0;border-radius:50%;pointer-events:none;z-index:10000;mix-blend-mode:difference;transition:transform .15s var(--ease),width .2s,height .2s}
    .cursor-dot{width:8px;height:8px;background:#fff;transform:translate(-50%,-50%)}
    .cursor-ring{width:36px;height:36px;border:2px solid rgba(255,255,255,.5);transform:translate(-50%,-50%);transition:transform .25s var(--ease),width .25s,height .25s,opacity .2s}
    .cursor-ring.grow{width:60px;height:60px;background:rgba(124,58,237,.15);border-color:var(--secondary)}
    @media(max-width:1024px){.cursor-dot,.cursor-ring{display:none}}

    @media(max-width:480px){
      .actions{flex-direction:column;width:100%}
      .btn{width:100%;justify-content:center}
    }
  </style>
</head>
<body>
  <div class="bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="grid-bg"></div>
  <div class="cursor-dot"></div><div class="cursor-ring"></div>

  <div class="float-emoji fe-1">🎨</div>
  <div class="float-emoji fe-2">💻</div>
  <div class="float-emoji fe-3">📱</div>
  <div class="float-emoji fe-4">🚀</div>

  <div class="content">
    <!-- <a href="index.html" class="logo">STACKLY</a> -->

    <div class="error-code">
      <span class="digit glitch" data-text="4">4</span>
      <span class="digit glitch" data-text="0">0</span>
      <span class="digit glitch" data-text="4">4</span>
    </div>

    <h1>Oops! Page Not Found</h1>
    <p>The page you're looking for seems to have drifted into the digital void. Let's get you back on track.</p>

    <div class="actions">
      <a href="admin.html" class="btn btn-primary">← Back to Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
    </div>
  </div>

  <script>
    (function(){
      if(window.matchMedia('(max-width:1024px)').matches)return;
      var dot=document.querySelector('.cursor-dot'),ring=document.querySelector('.cursor-ring'),mx=0,my=0,rx=0,ry=0;
      document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'});
      function anim(){rx+=(mx-rx)*.2;ry+=(my-ry)*.2;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)}anim();
      document.querySelectorAll('a,button').forEach(function(el){el.addEventListener('mouseenter',function(){ring.classList.add('grow')});el.addEventListener('mouseleave',function(){ring.classList.remove('grow')})});
    })();
    document.querySelectorAll('.btn').forEach(function(btn){btn.addEventListener('click',function(e){var r=document.createElement('span'),rect=btn.getBoundingClientRect(),s=Math.max(rect.width,rect.height);r.style.cssText='position:absolute;border-radius:50%;background:rgba(255,255,255,.4);width:'+s+'px;height:'+s+'px;left:'+(e.clientX-rect.left-s/2)+'px;top:'+(e.clientY-rect.top-s/2)+'px;transform:scale(0);animation:rip .6s ease-out;pointer-events:none';btn.appendChild(r);setTimeout(function(){r.remove()},600)})});
    var st=document.createElement('style');st.textContent='@keyframes rip{to{transform:scale(2.5);opacity:0}}';document.head.appendChild(st);
  </script>
</body>
</html>
